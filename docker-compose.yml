services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - healthcare-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - healthcare-network

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: eureka
      EUREKA_PASSWORD: password
    networks:
      - healthcare-network

  # Microservices
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  patient-service:
    build:
      context: .
      dockerfile: patient-service/Dockerfile
    container_name: patient-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patients_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  doctor-service:
    build:
      context: .
      dockerfile: doctor-service/Dockerfile
    container_name: doctor-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doctors_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    container_name: appointment-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - postgres
      - rabbitmq
    env_file:
      - appointment-service/src/main/resources/.env
    #    environment:
    #      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appointments_db
    #      SPRING_DATASOURCE_USERNAME: postgres
    #      SPRING_DATASOURCE_PASSWORD: password
    #      SPRING_RABBITMQ_HOST: rabbitmq
    #      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - rabbitmq
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  pharmacist-service:
    build:
      context: .
      dockerfile: pharmacist-service/Dockerfile
    container_name: pharmacist-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pharmacist_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  prescription-service:
    build:
      context: .
      dockerfile: prescription-service/Dockerfile
    container_name: prescription-service
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/prescription_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

  receptionist-service:
    build:
      context: .
      dockerfile: receptionist-service/Dockerfile
    container_name: receptionist-service
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/receptionist_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@eureka-server:8761/eureka/
    networks:
      - healthcare-network

networks:
  healthcare-network:
    driver: bridge
