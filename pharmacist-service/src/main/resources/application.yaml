server:
  port: ${PORT:8086}

spring:
  application:
    name: pharmacist-service          # This is the name Eureka registers under

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pharmacist_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:076493}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:password}@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5   # Fetch registry every 5s (default 30)
  instance:
    prefer-ip-address: true              # Register with IP not hostname
    lease-renewal-interval-in-seconds: 10     # Heartbeat every 10s (default 30)
    lease-expiration-duration-in-seconds: 30  # Deregister if no heartbeat for 30s

logging:
  level:
    com.healthcare.patient: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method