server:
  port: ${PORT:8088}

spring:
  application:
    name: prescription-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/prescription_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      connection-timeout: 30000
      idle-timeout: 180000
      max-lifetime: 240000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true  # enables fallback support


eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:password}@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    com.healthcare.prescription: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

services:
  url:
    doctor-service: ${DOCTOR_SERVICE_URL:http://localhost:8082}
    inventory-service: ${INVENTORY_SERVICE_URL:http://localhost:8087}