server:
  port: ${PORT:8090}

spring:
  application:
    name: receptionist-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/receptionist_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:076493}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      connection-timeout: 30000
      idle-timeout: 180000
      max-lifetime: 240000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: postgresql
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:password}@localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

logging:
  level:
    com.healthcare.receptionist: DEBUG
