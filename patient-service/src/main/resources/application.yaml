server:
  port: ${PORT:8081}

spring:
  application:
    name: patient-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/patients_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:076493}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      connection-timeout: 30000
      idle-timeout: 180000
      max-lifetime: 240000
      keepalive-time: 60000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate           # Flyway owns the schema — JPA only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.healthcare.patient: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

services:
  url:
    patient-service: ${AUTH_SERVICE_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never